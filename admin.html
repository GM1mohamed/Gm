<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم - تحدي الصورة</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .login-screen {
      max-width: 400px;
      margin: 100px auto;
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }
    
    .admin-panel.hidden {
      display: none;
    }
    
    .answers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    
    .answer-card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .answer-card img {
      width: 100%;
      max-height: 200px;
      object-fit: contain;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    
    .answer-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    
    .btn-success {
      background: #10b981;
      color: white;
      flex: 1;
    }
    
    .btn-danger {
      background: #ef4444;
      color: white;
      flex: 1;
    }
    
    .admin-header {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .question-form {
      background: white;
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 24px;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }
    
    .stat-card h3 {
      color: var(--gray);
      font-size: 14px;
      margin-bottom: 8px;
    }
    
    .stat-card .value {
      font-size: 32px;
      font-weight: bold;
      color: var(--primary);
    }
  </style>
</head>
<body>
  <!-- شاشة تسجيل الدخول -->
  <div id="loginScreen" class="login-screen">
    <h2 style="text-align: center; margin-bottom: 24px;">🔐 دخول المسؤول</h2>
    <form id="loginForm">
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" id="adminPassword" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn-primary btn-block">دخول</button>
    </form>
  </div>
  
  <!-- لوحة التحكم -->
  <div id="adminPanel" class="admin-panel hidden">
    <div class="admin-container">
      <header class="admin-header">
        <h1>🎯 لوحة تحكم المسؤول</h1>
        <button id="logoutBtn" class="btn-ghost">تسجيل الخروج</button>
      </header>
      
      <!-- إحصائيات سريعة -->
      <div class="stats-grid">
        <div class="stat-card">
          <h3>👥 إجمالي المشاركين</h3>
          <div class="value" id="statParticipants">0</div>
        </div>
        <div class="stat-card">
          <h3>📋 في انتظار المراجعة</h3>
          <div class="value" id="statPending">0</div>
        </div>
        <div class="stat-card">
          <h3>✅ إجابات صحيحة</h3>
          <div class="value" id="statCorrect">0</div>
        </div>
        <div class="stat-card">
          <h3>📊 مشاركات اليوم</h3>
          <div class="value" id="statToday">0</div>
        </div>
      </div>
      
      <!-- نموذج إضافة سؤال -->
      <div class="question-form">
        <h2>📝 إضافة سؤال اليوم</h2>
        <form id="addQuestionForm">
          <div class="form-group">
            <label>تاريخ التحدي</label>
            <input type="date" id="challengeDate" required>
          </div>
          
          <div class="form-group">
            <label>نص السؤال</label>
            <textarea id="questionTextInput" rows="3" required></textarea>
          </div>
          
          <div class="form-group">
            <label>وصف الإجابة الصحيحة (للمراجعة)</label>
            <textarea id="correctAnswerDesc" rows="2"></textarea>
          </div>
          
          <div class="form-group">
            <label>صورة السؤال (اختياري)</label>
            <input type="file" id="questionImageInput" accept="image/*">
          </div>
          
          <button type="submit" class="btn-primary">💾 حفظ السؤال</button>
        </form>
      </div>
      
      <!-- قائمة الإجابات للمراجعة -->
      <div>
        <h2>📋 الإجابات في انتظار المراجعة</h2>
        <div id="pendingAnswers" class="answers-grid">
          <div class="loading-placeholder">جاري التحميل...</div>
        </div>
      </div>
    </div>
  </div>
  
  <script type="module" src="admin.js"></script>
</body>
</html>
