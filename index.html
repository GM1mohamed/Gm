<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMube Edu - المنصة التعليمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="top-bar">
        <a href="index.html" class="logo">
            <i class="fas fa-graduation-cap"></i>
            <span>GMube Edu</span>
        </a>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="ابحث عن درس...">
            <i class="fas fa-search"></i>
        </div>
        <div id="authButtons">
            <a href="login.html" class="btn btn-sm" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> دخول
            </a>
            <div id="userInfo" style="display: none; align-items: center; gap: 10px;">
                <span id="userName" style="font-size: 13px; font-weight: 600;"></span>
                <button onclick="logout()" class="btn btn-secondary btn-sm">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="categories-bar" id="categoriesBar"></div>

    <div class="teachers-strip" id="teachersStrip">
        <h3><i class="fas fa-chalkboard-teacher"></i> الأساتذة</h3>
        <div class="teachers-scroll" id="teachersScroll"></div>
    </div>

    <div style="padding: 0 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;">
        <h3 style="font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px;">
            <i class="fas fa-fire" style="color: var(--primary); font-size: 16px;"></i>
            آخر الدروس
        </h3>
        <span id="videoCount" style="color: var(--text-muted); font-size: 12px;"></span>
    </div>

    <div class="videos-grid" id="videosGrid"></div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <i class="fas fa-home"></i>
            <span>الرئيسية</span>
        </a>
        <a href="pages/teachers.html" class="nav-item">
            <i class="fas fa-users"></i>
            <span>الأساتذة</span>
        </a>
        <a href="login.html" class="nav-item" id="accountNav">
            <i class="fas fa-user"></i>
            <span>حسابي</span>
        </a>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/error-handler.js"></script>
    <script>
        var currentCategory = 'الكل';
        var allVideos = [];
        var searchTimeout;
        
        document.addEventListener('DOMContentLoaded', function() {
            loadCategories();
            loadTeachers();
            loadVideos('الكل');
            checkAuth();
            
            document.getElementById('searchInput').addEventListener('input', function(e) {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(function() {
                    filterVideos(e.target.value.toLowerCase());
                }, 250);
            });
        });
        
        function checkAuth() {
            var session = getSession();
            if (session) {
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('userInfo').style.display = 'flex';
                document.getElementById('userName').textContent = session.name;
                document.getElementById('accountNav').href = session.type === 'teacher' ? 'pages/teacher.html' : 'login.html';
            }
        }
        
        function loadCategories() {
            var container = document.getElementById('categoriesBar');
            CATEGORIES.forEach(function(cat, i) {
                var btn = document.createElement('button');
                btn.className = 'category-btn' + (i === 0 ? ' active' : '');
                btn.textContent = cat;
                btn.onclick = function() {
                    document.querySelectorAll('.category-btn').forEach(function(b) { b.classList.remove('active'); });
                    btn.classList.add('active');
                    currentCategory = cat;
                    document.getElementById('searchInput').value = '';
                    filterByCategory(cat);
                };
                container.appendChild(btn);
            });
        }
        
        function loadTeachers() {
            getTeachers().then(function(teachers) {
                var container = document.getElementById('teachersScroll');
                var strip = document.getElementById('teachersStrip');
                
                if (!teachers || !teachers.length) {
                    strip.style.display = 'none';
                    return;
                }
                
                strip.style.display = 'block';
                container.innerHTML = '';
                
                teachers.forEach(function(t) {
                    var card = document.createElement('div');
                    card.className = 'teacher-card';
                    
                    var avatar = t.avatar 
                        ? '<img src="' + t.avatar + '" alt="' + esc(t.name) + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\';">' +
                          '<i class="fas fa-user-circle" style="display:none;"></i>'
                        : '<i class="fas fa-user-circle"></i>';
                    
                    card.innerHTML = avatar +
                        '<div class="teacher-name">' + esc(t.name) + '</div>' +
                        '<div class="teacher-subject">' + esc(t.subject) + '</div>';
                    
                    card.onclick = function() { location.href = 'pages/channel.html?id=' + t.user_id; };
                    container.appendChild(card);
                });
            }).catch(function() {});
        }
        
        function loadVideos(category) {
            document.getElementById('videosGrid').innerHTML = 
                '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>جاري التحميل...</p></div>';
            
            getVideos(category).then(function(videos) {
                allVideos = videos || [];
                renderVideos(allVideos);
                document.getElementById('videoCount').textContent = allVideos.length + ' درس';
            }).catch(function() {
                document.getElementById('videosGrid').innerHTML = 
                    '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>فشل التحميل</p></div>';
            });
        }
        
        function renderVideos(videos) {
            var container = document.getElementById('videosGrid');
            
            if (!videos.length) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-video-slash"></i><p>لا توجد دروس</p></div>';
                return;
            }
            
            container.innerHTML = '';
            videos.forEach(function(v, i) {
                var card = document.createElement('div');
                card.className = 'video-card fade-in';
                card.style.animationDelay = (i * 0.03) + 's';
                
                var thumb = v.thumbnail
                    ? '<img src="' + v.thumbnail + '" alt="" onerror="this.parentElement.style.background=\'linear-gradient(135deg, var(--primary-dark), var(--primary))\';this.style.display=\'none\';">'
                    : '';
                
                var thumbStyle = v.thumbnail ? '' : 'background:linear-gradient(135deg, var(--primary-dark), var(--primary));';
                
                card.innerHTML = 
                    '<div class="video-thumbnail" style="' + thumbStyle + 'display:flex;align-items:center;justify-content:center;">' +
                        thumb +
                        (!v.thumbnail ? '<i class="fas fa-play-circle" style="font-size:40px;color:#fff;opacity:0.7;"></i>' : '') +
                        '<div class="play-overlay"><i class="fas fa-play"></i></div>' +
                        (v.grade ? '<span class="badge">' + esc(v.grade) + '</span>' : '') +
                    '</div>' +
                    '<div class="video-info">' +
                        '<div class="video-title">' + esc(v.title || 'بدون عنوان') + '</div>' +
                        '<div class="video-meta">' +
                            '<span><i class="fas fa-user-circle"></i> ' + esc(v.user_name || '') + '</span>' +
                            '<span><i class="fas fa-eye"></i> ' + fmt(v.views || 0) + '</span>' +
                        '</div>' +
                    '</div>';
                
                card.onclick = function() { location.href = 'pages/watch.html?id=' + v.id; };
                container.appendChild(card);
            });
        }
        
        function filterVideos(term) {
            var filtered = allVideos;
            if (currentCategory !== 'الكل') {
                filtered = filtered.filter(function(v) { return v.category === currentCategory; });
            }
            if (term) {
                filtered = filtered.filter(function(v) {
                    return (v.title || '').toLowerCase().includes(term) ||
                           (v.user_name || '').toLowerCase().includes(term) ||
                           (v.category || '').toLowerCase().includes(term);
                });
            }
            renderVideos(filtered);
            document.getElementById('videoCount').textContent = filtered.length + ' درس';
        }
        
        function filterByCategory(cat) {
            currentCategory = cat;
            filterVideos(document.getElementById('searchInput').value.toLowerCase());
        }
        
        function esc(t) {
            if (!t) return '';
            var d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }
        
        function fmt(n) {
            if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
            if (n >= 1000) return (n/1000).toFixed(1) + 'K';
            return n.toString();
        }
    </script>
</body>
</html>
