<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMube Edu - تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="page-container">
        <div class="login-container">
            <div class="logo-section">
                <i class="fas fa-graduation-cap"></i>
                <h2>GMube Edu</h2>
                <p>تسجيل الدخول إلى المنصة</p>
            </div>
            
            <div class="login-tabs">
                <div class="login-tab active" data-type="student" onclick="switchTab('student',this)">
                    <i class="fas fa-user-graduate"></i> طالب
                </div>
                <div class="login-tab" data-type="teacher" onclick="switchTab('teacher',this)">
                    <i class="fas fa-chalkboard-teacher"></i> معلم
                </div>
            </div>
            
            <div class="form-group">
                <label>الاسم</label>
                <input type="text" id="name" placeholder="أدخل اسمك">
            </div>
            
            <div class="form-group password-group">
                <label>الرمز السري</label>
                <input type="password" id="secret" placeholder="أدخل الرمز السري">
                <i class="fas fa-eye password-toggle" onclick="togglePass()"></i>
            </div>
            
            <button class="btn" onclick="handleLogin()" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
            </button>
            
            <div id="error" class="alert alert-error" style="display:none;margin-top:12px;"></div>
            
            <div style="text-align:center;margin-top:16px;">
                <a href="index.html" style="color:var(--text-muted);text-decoration:none;font-size:13px;">
                    <i class="fas fa-arrow-right"></i> العودة للرئيسية
                </a>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/error-handler.js"></script>
    <script>
        var type = 'student';
        
        if (getSession()) {
            location.href = getSession().type === 'teacher' ? 'pages/teacher.html' : 'index.html';
        }
        
        function switchTab(t, btn) {
            type = t;
            document.querySelectorAll('.login-tab').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            hideError();
        }
        
        function togglePass() {
            var input = document.getElementById('secret');
            var icon = document.querySelector('.password-toggle');
            if (input.type === 'password') { input.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash'); }
            else { input.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye'); }
        }
        
        function showError(msg) {
            var el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'flex';
        }
        
        function hideError() {
            document.getElementById('error').style.display = 'none';
        }
        
        function handleLogin() {
            var name = document.getElementById('name').value.trim();
            var secret = document.getElementById('secret').value.trim();
            
            hideError();
            
            if (!name) { showError('أدخل الاسم'); return; }
            if (!secret) { showError('أدخل الرمز السري'); return; }
            
            var btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الدخول...';
            
            login(type, name, secret).then(function(session) {
                location.href = session.type === 'teacher' ? 'pages/teacher.html' : 'index.html';
            }).catch(function(e) {
                showError(e.message || 'خطأ في الدخول');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول';
            });
        }
        
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
