<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMube Edu - مشاهدة الدرس</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    
    <!-- Plyr CSS -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <style>
        .video-player-wrapper {
            background: #000;
            border-radius: var(--radius);
            overflow: hidden;
            aspect-ratio: 16 / 9;
            width: 100%;
        }
        
        /* إخفاء شعار يوتيوب بالكامل */
        .plyr--youtube .plyr__control[data-plyr="youtube-logo"] {
            display: none !important;
        }
        
        /* تخصيص ألوان Plyr */
        .plyr--video .plyr__control--overlaid,
        .plyr--video .plyr__control:hover,
        .plyr--video .plyr__control[aria-expanded="true"] {
            background: var(--primary) !important;
        }
        
        .plyr--video .plyr__progress__buffer {
            background: var(--primary) !important;
        }
        
        .plyr__progress--played,
        .plyr__volume--display {
            color: var(--primary) !important;
        }
        
        .action-buttons {
            display: flex;
            gap: 8px;
            margin: 16px 0;
            flex-wrap: wrap;
        }
        
        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--surface2);
            border: none;
            color: var(--text);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
            transition: all 0.2s ease;
        }
        
        .action-btn:hover, .action-btn.liked {
            background: var(--primary);
        }
        
        .video-stats {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin: 12px 0;
        }
        
        .stat-badge {
            background: var(--surface2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .comment-form, .comment-item {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        
        .star-rating i {
            cursor: pointer;
            color: var(--text-muted);
            font-size: 22px;
            margin-left: 4px;
        }
        
        .star-rating i:hover, .star-rating i.active {
            color: var(--warning);
        }
        
        textarea {
            width: 100%;
            padding: 10px;
            background: var(--surface2);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            margin: 10px 0;
            resize: vertical;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        
        .btn-sm {
            padding: 6px 14px;
            font-size: 12px;
            border-radius: 8px;
            width: auto;
        }
        
        .comment-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        
        .comment-text {
            font-size: 13px;
            margin-top: 8px;
        }
        
        .loading-spinner {
            text-align: center;
            padding: 40px;
        }
        
        .loading-spinner i {
            font-size: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="../index.html" class="logo">
            <i class="fas fa-graduation-cap"></i>
            <span>GMube Edu</span>
        </a>
        <div style="display:flex;gap:8px;">
            <button onclick="history.back()" class="btn btn-secondary btn-sm">
                <i class="fas fa-arrow-right"></i> رجوع
            </button>
            <a href="../index.html" class="btn btn-secondary btn-sm">
                <i class="fas fa-home"></i> الرئيسية
            </a>
        </div>
    </div>

    <div class="page-container">
        <div id="watchContent">
            <div class="loading-spinner">
                <i class="fas fa-spinner fa-spin"></i>
                <p>جاري التحميل...</p>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="../index.html" class="nav-item"><i class="fas fa-home"></i><span>الرئيسية</span></a>
        <a href="teachers.html" class="nav-item"><i class="fas fa-users"></i><span>الأساتذة</span></a>
        <a href="../login.html" class="nav-item" id="accountNav"><i class="fas fa-user"></i><span>حسابي</span></a>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/error-handler.js"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    
    <script>
        var video = null;
        var session = getSession();
        var rating = 0;
        var liked = false;
        var plyrPlayer = null;
        
        document.addEventListener('DOMContentLoaded', function() {
            updateAccountNav();
            var id = new URLSearchParams(window.location.search).get('id');
            if (id) {
                loadVideo(id);
            } else {
                location.href = '../index.html';
            }
        });
        
        function updateAccountNav() {
            if (session) {
                var navLink = document.getElementById('accountNav');
                if (navLink) {
                    navLink.href = session.type === 'teacher' ? 'teacher.html' : 'profile.html';
                }
            }
        }
        
        function loadVideo(id) {
            getVideoById(id).then(function(v) {
                if (!v) {
                    showError('الدرس غير موجود');
                    return;
                }
                video = v;
                updateVideoViews(video.id, (video.views || 0) + 1);
                video.views = (video.views || 0) + 1;
                renderVideo();
                loadComments();
                checkIfLiked();
            }).catch(function(err) {
                console.error(err);
                showError('فشل تحميل الدرس');
            });
        }
        
        function showError(msg) {
            document.getElementById('watchContent').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>' + msg + '</p></div>';
        }
        
        function checkIfLiked() {
            if (!session) return;
            var likedVideos = JSON.parse(localStorage.getItem('liked_videos') || '[]');
            liked = likedVideos.indexOf(video.id) !== -1;
            var likeBtn = document.getElementById('likeBtn');
            if (likeBtn && liked) {
                likeBtn.classList.add('liked');
            }
        }
        
        function extractYouTubeId(url) {
            if (!url) return null;
            var patterns = [
                /(?:youtube\.com\/watch\?v=)([^&]+)/,
                /(?:youtu\.be\/)([^?]+)/,
                /(?:youtube\.com\/embed\/)([^?]+)/,
                /(?:youtube\.com\/shorts\/)([^?]+)/
            ];
            for (var i = 0; i < patterns.length; i++) {
                var match = url.match(patterns[i]);
                if (match) return match[1];
            }
            return null;
        }
        
        function initPlyr(videoId) {
            if (plyrPlayer) {
                plyrPlayer.destroy();
            }
            
            var playerElement = document.querySelector('#plyr-player');
            if (playerElement) {
                plyrPlayer = new Plyr(playerElement, {
                    controls: [
                        'play-large',
                        'play',
                        'progress',
                        'current-time',
                        'duration',
                        'mute',
                        'volume',
                        'captions',
                        'settings',
                        'pip',
                        'fullscreen'
                    ],
                    settings: ['captions', 'quality', 'speed'],
                    speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 1.75, 2] },
                    i18n: {
                        play: 'تشغيل',
                        pause: 'إيقاف',
                        mute: 'كتم الصوت',
                        unmute: 'إلغاء كتم الصوت',
                        settings: 'الإعدادات',
                        speed: 'السرعة',
                        normal: 'عادي'
                    }
                });
            }
        }
        
        function getVideoHtml() {
            var sourceType = video.source_type || 'youtube';
            var videoUrl = video.url || '';
            var playerHtml = '';
            
            // معالجة YouTube (بدون علامة المصدر)
            if (sourceType === 'youtube' || videoUrl.indexOf('youtube.com') !== -1 || videoUrl.indexOf('youtu.be') !== -1) {
                var videoId = extractYouTubeId(videoUrl);
                
                if (videoId) {
                    playerHtml = '<div id="plyr-player" data-plyr-provider="youtube" data-plyr-embed-id="' + videoId + '"></div>';
                    return {
                        html: playerHtml,
                        needsInit: true,
                        videoId: videoId
                    };
                } else {
                    playerHtml = '<div class="empty-state"><i class="fab fa-youtube"></i><p>رابط غير صالح</p><a href="' + videoUrl + '" target="_blank" class="btn">فتح على YouTube</a></div>';
                    return {
                        html: playerHtml,
                        needsInit: false,
                        videoId: null
                    };
                }
            }
            // معالجة Telegram (بدون علامة المصدر)
            else if (sourceType === 'telegram' && videoUrl) {
                playerHtml = '<video controls autoplay style="width:100%; border-radius:12px;" poster="' + (video.thumbnail || '') + '">' +
                             '<source src="' + videoUrl + '" type="video/mp4">' +
                             'متصفحك لا يدعم تشغيل الفيديو.</video>';
                return {
                    html: playerHtml,
                    needsInit: false,
                    videoId: null
                };
            }
            // رابط مباشر
            else if (videoUrl && videoUrl.indexOf('.mp4') !== -1) {
                playerHtml = '<video controls autoplay style="width:100%; border-radius:12px;" poster="' + (video.thumbnail || '') + '">' +
                             '<source src="' + videoUrl + '" type="video/mp4">' +
                             'متصفحك لا يدعم تشغيل الفيديو.</video>';
                return {
                    html: playerHtml,
                    needsInit: false,
                    videoId: null
                };
            }
            else {
                playerHtml = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>لا يوجد رابط فيديو صالح</p></div>';
                return {
                    html: playerHtml,
                    needsInit: false,
                    videoId: null
                };
            }
        }
        
        function renderVideo() {
            var playerData = getVideoHtml();
            
            var starsHtml = '';
            for (var s = 1; s <= 5; s++) {
                starsHtml += '<i class="fas fa-star" data-v="' + s + '"></i>';
            }
            
            var container = document.getElementById('watchContent');
            container.innerHTML = 
                '<div class="video-player-wrapper">' + playerData.html + '</div>' +
                '<div style="margin-top:16px">' +
                    '<h2 style="font-size:18px;margin-bottom:8px;">' + esc(video.title || 'بدون عنوان') + '</h2>' +
                    '<div class="video-stats">' +
                        '<span class="stat-badge"><i class="fas fa-user-circle"></i> ' + esc(video.user_name || '') + '</span>' +
                        '<span class="stat-badge"><i class="fas fa-book"></i> ' + esc(video.category || '') + '</span>' +
                        '<span class="stat-badge"><i class="fas fa-graduation-cap"></i> ' + esc(video.grade || '') + '</span>' +
                        '<span class="stat-badge"><i class="fas fa-eye"></i> ' + fmt(video.views || 0) + '</span>' +
                        '<span class="stat-badge"><i class="fas fa-star"></i> ' + (video.avg_rating || 0).toFixed(1) + ' (' + (video.rating_count || 0) + ')</span>' +
                    '</div>' +
                    '<div class="action-buttons">' +
                        '<button class="action-btn" id="likeBtn" onclick="toggleLike()">' +
                            '<i class="fas fa-thumbs-up"></i> <span id="likesCount">' + (video.likes || 0) + '</span>' +
                        '</button>' +
                        '<button class="action-btn" onclick="saveVideo()">' +
                            '<i class="fas fa-bookmark"></i> حفظ' +
                        '</button>' +
                        '<button class="action-btn" onclick="shareVideo()">' +
                            '<i class="fas fa-share"></i> مشاركة' +
                        '</button>' +
                    '</div>' +
                '</div>' +
                '<div class="comment-form">' +
                    '<h4 style="margin-bottom:10px"><i class="fas fa-comment"></i> أضف تعليق وتقييم</h4>' +
                    '<div class="star-rating" id="stars">' + starsHtml + '</div>' +
                    '<textarea id="commentText" placeholder="اكتب تعليقك..." rows="3"></textarea>' +
                    '<button class="btn btn-sm" onclick="addComment()"><i class="fas fa-paper-plane"></i> إرسال</button>' +
                '</div>' +
                '<div id="commentsList"></div>';
            
            if (playerData.needsInit && playerData.videoId) {
                setTimeout(function() {
                    initPlyr(playerData.videoId);
                }, 100);
            }
            
            initStars();
            var likeBtn = document.getElementById('likeBtn');
            if (likeBtn && liked) {
                likeBtn.classList.add('liked');
            }
        }
        
        function initStars() {
            var stars = document.querySelectorAll('#stars i');
            for (var i = 0; i < stars.length; i++) {
                var star = stars[i];
                star.onclick = (function(s) {
                    return function() {
                        rating = parseInt(s.getAttribute('data-v'));
                        updateStars();
                    };
                })(star);
                star.onmouseover = (function(s) {
                    return function() {
                        var v = parseInt(s.getAttribute('data-v'));
                        for (var j = 0; j < stars.length; j++) {
                            stars[j].style.color = j < v ? 'var(--warning)' : 'var(--text-muted)';
                        }
                    };
                })(star);
            }
            document.getElementById('stars').onmouseleave = updateStars;
        }
        
        function updateStars() {
            var stars = document.querySelectorAll('#stars i');
            for (var i = 0; i < stars.length; i++) {
                stars[i].style.color = i < rating ? 'var(--warning)' : 'var(--text-muted)';
            }
        }
        
        function toggleLike() {
            if (!session) {
                alert('يرجى تسجيل الدخول');
                return;
            }
            
            var btn = document.getElementById('likeBtn');
            var count = video.likes || 0;
            var likedVideos = JSON.parse(localStorage.getItem('liked_videos') || '[]');
            var index = likedVideos.indexOf(video.id);
            
            if (liked) {
                count--;
                btn.classList.remove('liked');
                liked = false;
                if (index !== -1) {
                    likedVideos.splice(index, 1);
                }
            } else {
                count++;
                btn.classList.add('liked');
                liked = true;
                likedVideos.push(video.id);
            }
            
            localStorage.setItem('liked_videos', JSON.stringify(likedVideos));
            
            updateVideoLikes(video.id, count).then(function() {
                video.likes = count;
                document.getElementById('likesCount').textContent = count;
            }).catch(function(e) {
                alert('فشل تحديث الإعجابات: ' + e.message);
            });
        }
        
        function saveVideo() {
            if (!session) {
                alert('يرجى تسجيل الدخول');
                return;
            }
            
            var saved = JSON.parse(localStorage.getItem('saved_videos') || '[]');
            if (saved.indexOf(video.id) !== -1) {
                alert('تم حفظ هذا الدرس مسبقاً');
                return;
            }
            saved.push(video.id);
            localStorage.setItem('saved_videos', JSON.stringify(saved));
            alert('تم حفظ الدرس');
        }
        
        function shareVideo() {
            var url = location.href;
            if (navigator.share) {
                navigator.share({ title: video.title, url: url }).catch(function() {});
            } else {
                navigator.clipboard.writeText(url).then(function() {
                    alert('تم نسخ الرابط');
                });
            }
        }
        
        function addComment() {
            if (!session) {
                alert('يرجى تسجيل الدخول');
                return;
            }
            
            var text = document.getElementById('commentText').value.trim();
            if (!text) {
                alert('اكتب تعليقاً');
                return;
            }
            if (!rating) {
                alert('اختر تقييماً');
                return;
            }
            
            addComment(video.id, session.user_id, session.name, text, rating).then(function() {
                return getComments(video.id).then(function(comments) {
                    if (comments && comments.length > 0) {
                        var totalRating = 0;
                        for (var i = 0; i < comments.length; i++) {
                            totalRating += (comments[i].rating || 0);
                        }
                        var avgRating = totalRating / comments.length;
                        return updateVideoRating(video.id, avgRating, comments.length);
                    }
                });
            }).then(function() {
                document.getElementById('commentText').value = '';
                rating = 0;
                updateStars();
                loadComments();
                getVideoById(video.id).then(function(v) {
                    if (v) {
                        video.avg_rating = v.avg_rating;
                        video.rating_count = v.rating_count;
                        var ratingSpan = document.querySelector('.stat-badge:last-child');
                        if (ratingSpan) {
                            ratingSpan.innerHTML = '<i class="fas fa-star"></i> ' + (video.avg_rating || 0).toFixed(1) + ' (' + (video.rating_count || 0) + ')';
                        }
                    }
                });
            }).catch(function(e) {
                alert('فشل إضافة التعليق: ' + e.message);
            });
        }
        
        function loadComments() {
            getComments(video.id).then(function(comments) {
                var container = document.getElementById('commentsList');
                
                if (!comments || comments.length === 0) {
                    container.innerHTML = '<p style="text-align:center;padding:20px;color:var(--text-muted)">لا توجد تعليقات بعد</p>';
                    return;
                }
                
                var html = '';
                for (var i = 0; i < comments.length; i++) {
                    var c = comments[i];
                    var starsHtml = '';
                    for (var s = 1; s <= 5; s++) {
                        starsHtml += '<i class="fas fa-star" style="color:' + (s <= c.rating ? 'var(--warning)' : 'var(--text-muted)') + ';font-size:11px"></i>';
                    }
                    html += '<div class="comment-item">' +
                                '<div class="comment-header">' +
                                    '<strong>' + esc(c.user_name) + '</strong>' +
                                    '<span>' + fmtDate(c.created_at) + '</span>' +
                                '</div>' +
                                '<div>' + starsHtml + '</div>' +
                                '<div class="comment-text">' + esc(c.text) + '</div>' +
                            '</div>';
                }
                container.innerHTML = html;
            });
        }
        
        function esc(t) {
            if (!t) return '';
            var d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }
        
        function fmt(n) {
            if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
            if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
            return n.toString();
        }
        
        function fmtDate(d) {
            if (!d) return '';
            try {
                return new Date(d).toLocaleDateString('ar-EG');
            } catch(e) {
                return '';
            }
        }
    </script>
</body>
</html>
