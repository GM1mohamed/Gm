<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMube Edu - قائمة التشغيل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .playlist-hero {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        
        .playlist-hero .icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .playlist-hero .icon i {
            font-size: 28px;
            color: #fff;
        }
        
        .playlist-hero .info h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .playlist-hero .info .meta {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .playlist-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .video-list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--surface);
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            margin-bottom: 4px;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid rgba(255,255,255,0.03);
        }
        
        .video-list-item:hover {
            background: var(--surface2);
        }
        
        .video-list-item .num {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
            min-width: 24px;
            text-align: center;
        }
        
        .video-list-item .thumb {
            width: 100px;
            height: 56px;
            border-radius: 6px;
            overflow: hidden;
            flex-shrink: 0;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .video-list-item .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .video-list-item .info {
            flex: 1;
            min-width: 0;
        }
        
        .video-list-item .title {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        
        .video-list-item .sub {
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            gap: 10px;
        }
        
        .view-toggle {
            display: flex;
            gap: 4px;
            background: var(--surface2);
            border-radius: 20px;
            padding: 2px;
        }
        
        .view-toggle button {
            padding: 5px 12px;
            border-radius: 18px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-size: 12px;
            transition: var(--transition);
        }
        
        .view-toggle button.active {
            background: var(--primary);
            color: #fff;
        }
        
        @media (max-width: 768px) {
            .playlist-hero { flex-direction: column; text-align: center; }
            .video-list-item .thumb { width: 80px; height: 45px; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="../index.html" class="logo">
            <i class="fas fa-graduation-cap"></i>
            <span>GMube Edu</span>
        </a>
        <div>
            <button onclick="history.back()" class="btn btn-secondary btn-sm">
                <i class="fas fa-arrow-right"></i> رجوع
            </button>
        </div>
    </div>

    <div class="page-container">
        <div id="playlistHero"></div>
        <div id="playlistActions" class="playlist-actions" style="display:none;"></div>
        
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
            <h3 style="font-size:15px;font-weight:700;"><i class="fas fa-list-ol" style="color:var(--primary);"></i> الفيديوهات <span id="count" style="font-size:12px;color:var(--text-muted);"></span></h3>
            <div class="view-toggle">
                <button class="active" onclick="setView('list',this)"><i class="fas fa-list"></i></button>
                <button onclick="setView('grid',this)"><i class="fas fa-th"></i></button>
            </div>
        </div>
        
        <div id="listView"></div>
        <div class="videos-grid" id="gridView" style="display:none;"></div>
        <div id="empty" class="empty-state" style="display:none;"><i class="fas fa-video-slash"></i><p>لا توجد فيديوهات</p></div>
    </div>

    <div class="bottom-nav">
        <a href="../index.html" class="nav-item"><i class="fas fa-home"></i><span>الرئيسية</span></a>
        <a href="teachers.html" class="nav-item"><i class="fas fa-users"></i><span>الأساتذة</span></a>
        <a href="../login.html" class="nav-item" id="accountNav"><i class="fas fa-user"></i><span>حسابي</span></a>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/error-handler.js"></script>
    <script>
        var playlist = null;
        var videos = [];
        var view = 'list';
        var session = getSession();
        
        document.addEventListener('DOMContentLoaded', function() {
            updateAccountNav();
            var id = new URLSearchParams(window.location.search).get('id');
            if (id) loadPlaylist(id);
            else location.href = '../index.html';
        });
        
        function updateAccountNav() {
            if (session) {
                document.getElementById('accountNav').href = session.type === 'teacher' ? 'teacher.html' : 'profile.html';
            }
        }
        
        function loadPlaylist(id) {
            api('playlists?id=eq.' + id).then(function(p) {
                if (!p || !p.length) return;
                playlist = p[0];
                
                api('videos?playlist_id=eq.' + id + '&order=created_at.asc').then(function(v) {
                    videos = v || [];
                    renderPlaylist();
                });
            });
        }
        
        function renderPlaylist() {
            document.getElementById('playlistHero').innerHTML = 
                '<div class="icon"><i class="fas fa-list"></i></div>' +
                '<div class="info">' +
                    '<h2>' + esc(playlist.name) + '</h2>' +
                    '<div class="meta">' +
                        '<span><i class="fas fa-user-circle"></i> ' + esc(playlist.teacher_name) + '</span>' +
                        '<span><i class="fas fa-book"></i> ' + esc(playlist.subject) + '</span>' +
                        '<span><i class="fas fa-video"></i> ' + videos.length + ' فيديو</span>' +
                    '</div>' +
                '</div>';
            
            if (videos.length) {
                document.getElementById('playlistActions').style.display = 'flex';
                document.getElementById('playlistActions').innerHTML = 
                    '<button class="btn btn-sm" onclick="playAll()"><i class="fas fa-play"></i> تشغيل الكل</button>' +
                    '<button class="btn btn-secondary btn-sm" onclick="shufflePlay()"><i class="fas fa-random"></i> عشوائي</button>' +
                    '<button class="btn btn-secondary btn-sm" onclick="share()"><i class="fas fa-share"></i> مشاركة</button>';
            }
            
            document.getElementById('count').textContent = '(' + videos.length + ')';
            
            if (!videos.length) {
                document.getElementById('empty').style.display = 'block';
                return;
            }
            
            renderView();
        }
        
        function renderView() {
            if (view === 'list') renderList();
            else renderGrid();
        }
        
        function renderList() {
            document.getElementById('listView').style.display = 'block';
            document.getElementById('gridView').style.display = 'none';
            
            var container = document.getElementById('listView');
            container.innerHTML = '';
            
            videos.forEach(function(v, i) {
                var div = document.createElement('div');
                div.className = 'video-list-item';
                
                var thumb = v.thumbnail
                    ? '<img src="' + v.thumbnail + '" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\';">' +
                      '<i class="fas fa-play" style="display:none;"></i>'
                    : '<i class="fas fa-play"></i>';
                
                div.innerHTML = 
                    '<span class="num">' + (i + 1) + '</span>' +
                    '<div class="thumb">' + thumb + '</div>' +
                    '<div class="info">' +
                        '<div class="title">' + esc(v.title) + '</div>' +
                        '<div class="sub">' +
                            '<span><i class="fas fa-eye"></i> ' + fmt(v.views) + '</span>' +
                            '<span><i class="fas fa-star" style="color:var(--warning);"></i> ' + (v.avg_rating||0).toFixed(1) + '</span>' +
                        '</div>' +
                    '</div>' +
                    '<i class="fas fa-chevron-left" style="color:var(--text-muted);font-size:12px;"></i>';
                
                div.onclick = function() { location.href = 'watch.html?id=' + v.id; };
                container.appendChild(div);
            });
        }
        
        function renderGrid() {
            document.getElementById('listView').style.display = 'none';
            document.getElementById('gridView').style.display = 'grid';
            
            var container = document.getElementById('gridView');
            container.innerHTML = '';
            
            videos.forEach(function(v, i) {
                var card = document.createElement('div');
                card.className = 'video-card fade-in';
                
                var thumb = v.thumbnail
                    ? '<img src="' + v.thumbnail + '" alt="" onerror="this.parentElement.style.background=\'linear-gradient(135deg, var(--primary-dark), var(--primary))\';this.style.display=\'none\';">'
                    : '';
                
                card.innerHTML = 
                    '<div class="video-thumbnail" style="' + (!v.thumbnail ? 'background:linear-gradient(135deg, var(--primary-dark), var(--primary));' : '') + 'display:flex;align-items:center;justify-content:center;">' +
                        thumb +
                        (!v.thumbnail ? '<i class="fas fa-play-circle" style="font-size:40px;color:#fff;opacity:0.7;"></i>' : '') +
                        '<span style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.7);padding:2px 8px;border-radius:4px;font-size:11px;">' + (i+1) + '</span>' +
                        '<div class="play-overlay"><i class="fas fa-play"></i></div>' +
                    '</div>' +
                    '<div class="video-info">' +
                        '<div class="video-title">' + esc(v.title) + '</div>' +
                        '<div class="video-meta">' +
                            '<span><i class="fas fa-tag"></i> ' + esc(v.category) + '</span>' +
                            '<span><i class="fas fa-eye"></i> ' + fmt(v.views) + '</span>' +
                        '</div>' +
                    '</div>';
                
                card.onclick = function() { location.href = 'watch.html?id=' + v.id; };
                container.appendChild(card);
            });
        }
        
        function setView(v, btn) {
            view = v;
            document.querySelectorAll('.view-toggle button').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            renderView();
        }
        
        function playAll() { if (videos.length) location.href = 'watch.html?id=' + videos[0].id; }
        function shufflePlay() { if (videos.length) location.href = 'watch.html?id=' + videos[Math.floor(Math.random() * videos.length)].id; }
        function share() {
            var url = location.href;
            if (navigator.share) navigator.share({ title: playlist.name, url: url }).catch(function() {});
            else navigator.clipboard.writeText(url).then(function() { alert('تم نسخ الرابط'); });
        }
        
        function esc(t) { if (!t) return ''; var d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function fmt(n) { if (n >= 1000000) return (n/1000000).toFixed(1) + 'M'; if (n >= 1000) return (n/1000).toFixed(1) + 'K'; return n.toString(); }
    </script>
</body>
</html>
