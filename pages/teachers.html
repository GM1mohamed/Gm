<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMube Edu - الأساتذة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .teachers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
        }
        
        .t-card {
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid rgba(255,255,255,0.04);
        }
        
        .t-card:hover {
            border-color: rgba(76,175,80,0.2);
            transform: translateY(-2px);
        }
        
        .t-card .cover {
            height: 80px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            position: relative;
        }
        
        .t-card .cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .t-card .avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 3px solid var(--surface);
            overflow: hidden;
            margin: -28px auto 0;
            position: relative;
            z-index: 1;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .t-card .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .t-card .avatar i {
            font-size: 24px;
            color: #fff;
        }
        
        .t-card .info {
            padding: 10px 14px 14px;
            text-align: center;
        }
        
        .t-card .name {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 2px;
        }
        
        .t-card .subject {
            font-size: 12px;
            color: var(--text-muted);
        }
        
        @media (max-width: 480px) {
            .teachers-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="../index.html" class="logo">
            <i class="fas fa-graduation-cap"></i>
            <span>GMube Edu</span>
        </a>
        <div class="search-bar" style="width:250px;">
            <input type="text" id="searchInput" placeholder="ابحث عن أستاذ...">
            <i class="fas fa-search"></i>
        </div>
        <div id="authBtns">
            <a href="../login.html" class="btn btn-sm" id="loginBtn"><i class="fas fa-sign-in-alt"></i> دخول</a>
            <div id="userInfo" style="display:none;align-items:center;gap:10px;">
                <span id="userName" style="font-size:13px;font-weight:600;"></span>
                <button onclick="logout()" class="btn btn-secondary btn-sm"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </div>

    <div class="page-container">
        <h2 style="font-size:20px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;">
            <i class="fas fa-users" style="color:var(--primary);"></i> الأساتذة
            <span id="count" style="font-size:14px;color:var(--text-muted);font-weight:400;"></span>
        </h2>
        <div class="teachers-grid" id="grid"></div>
    </div>

    <div class="bottom-nav">
        <a href="../index.html" class="nav-item"><i class="fas fa-home"></i><span>الرئيسية</span></a>
        <a href="teachers.html" class="nav-item active"><i class="fas fa-users"></i><span>الأساتذة</span></a>
        <a href="../login.html" class="nav-item" id="accountNav"><i class="fas fa-user"></i><span>حسابي</span></a>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/error-handler.js"></script>
    <script>
        var teachers = [];
        var session = getSession();
        
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            loadTeachers();
            document.getElementById('searchInput').addEventListener('input', function(e) {
                filter(e.target.value.toLowerCase());
            });
        });
        
        function checkAuth() {
            if (session) {
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('userInfo').style.display = 'flex';
                document.getElementById('userName').textContent = session.name;
                document.getElementById('accountNav').href = session.type === 'teacher' ? 'teacher.html' : 'profile.html';
            } else {
                document.getElementById('accountNav').href = '../login.html';
            }
        }
        
        function loadTeachers() {
            getTeachers().then(function(t) {
                teachers = t || [];
                render(teachers);
                document.getElementById('count').textContent = '(' + teachers.length + ')';
            });
        }
        
        function render(list) {
            var grid = document.getElementById('grid');
            
            if (!list.length) {
                grid.innerHTML = '<div class="empty-state"><i class="fas fa-user-slash"></i><p>لا يوجد أساتذة</p></div>';
                return;
            }
            
            grid.innerHTML = '';
            list.forEach(function(t, i) {
                var card = document.createElement('div');
                card.className = 't-card fade-in';
                card.style.animationDelay = (i * 0.03) + 's';
                
                var cover = t.cover ? '<img src="' + t.cover + '" alt="" onerror="this.remove();">' : '';
                var avatar = t.avatar
                    ? '<img src="' + t.avatar + '" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\';">' +
                      '<i class="fas fa-user-circle" style="display:none;"></i>'
                    : '<i class="fas fa-user-circle"></i>';
                
                card.innerHTML = 
                    '<div class="cover">' + cover + '</div>' +
                    '<div class="avatar">' + avatar + '</div>' +
                    '<div class="info">' +
                        '<div class="name">' + esc(t.name) + '</div>' +
                        '<div class="subject"><i class="fas fa-book"></i> ' + esc(t.subject) + '</div>' +
                    '</div>';
                
                card.onclick = function() { location.href = 'channel.html?id=' + t.user_id; };
                grid.appendChild(card);
            });
        }
        
        function filter(term) {
            var filtered = teachers.filter(function(t) {
                return (t.name || '').toLowerCase().includes(term) || (t.subject || '').toLowerCase().includes(term);
            });
            render(filtered);
            document.getElementById('count').textContent = '(' + filtered.length + ')';
        }
        
        function esc(t) { if (!t) return ''; var d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    </script>
</body>
</html>
